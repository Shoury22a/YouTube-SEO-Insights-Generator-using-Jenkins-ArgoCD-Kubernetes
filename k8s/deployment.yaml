apiVersion: apps/v1
kind: Deployment
metadata:
  name: youtube-seo-deployment
  labels:
    app: youtube-seo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: youtube-seo
  template:
    metadata:
      labels:
        app: youtube-seo
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8502"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: youtube-seo
        image: shour22ya/youtube-seo-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8501
        env:
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: youtube-seo-secrets
              key: google-api-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 10
